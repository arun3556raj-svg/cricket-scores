name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write

concurrency:
  group: cricket-scores-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        run: python scripts/build_static_site.py

      - name: Publish site to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_dir="$(mktemp -d)"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add "$publish_dir" origin/gh-pages
            cd "$publish_dir"
            git checkout -B gh-pages origin/gh-pages
          else
            git worktree add -B gh-pages "$publish_dir"
            cd "$publish_dir"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .

          git add --all

          if git diff --cached --quiet; then
            echo "No site changes to publish."
            exit 0
          fi

          git commit -m "Deploy site for $GITHUB_SHA"
          git push origin gh-pages --force
